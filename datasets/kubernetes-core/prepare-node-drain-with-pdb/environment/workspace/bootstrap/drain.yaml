---
apiVersion: v1
kind: Service
metadata:
  name: background-worker
  namespace: platform-team
  labels:
    app: background-worker
spec:
  selector:
    app: background-worker
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: background-worker
  namespace: platform-team
  labels:
    app: background-worker
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: background-worker
---
