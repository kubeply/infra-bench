apiVersion: v1
kind: Namespace
metadata:
  name: product-observability
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-bench-agent
  namespace: product-observability
---
apiVersion: v1
kind: Secret
metadata:
  name: infra-bench-agent-token
  namespace: product-observability
  annotations:
    kubernetes.io/service-account.name: infra-bench-agent
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: observability-ui
  namespace: product-observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infra-bench-agent
  namespace: product-observability
rules:
  - apiGroups: [""]
    resources:
      [
        "configmaps",
        "endpoints",
        "events",
        "pods",
        "pods/log",
        "secrets",
        "serviceaccounts",
        "services",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["observability-ui"]
    verbs: ["patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["observability-datasources"]
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infra-bench-agent
  namespace: product-observability
subjects:
  - kind: ServiceAccount
    name: infra-bench-agent
    namespace: product-observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infra-bench-agent
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-bench-baseline
  namespace: product-observability
data:
  ui_deployment_uid: ""
  ui_service_uid: ""
  incident_monitor_deployment_uid: ""
  logs_backend_deployment_uid: ""
  logs_backend_service_uid: ""
  docs_deployment_uid: ""
  docs_service_uid: ""
  demo_deployment_uid: ""
  demo_service_uid: ""
  metrics_backend_deployment_uid: ""
  metrics_backend_service_uid: ""
  datasource_secret_uid: ""
  logs_backend_content_uid: ""
  metrics_backend_content_uid: ""
  ui_serviceaccount_uid: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: observability-datasources
  namespace: product-observability
type: Opaque
stringData:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: cluster-logs
        type: loki
        access: proxy
        url: http://logs-backend.product-observability.svc.cluster.local:3200/ready
      - name: cluster-metrics
        type: prometheus
        access: proxy
        url: http://metrics-backend.product-observability.svc.cluster.local:9090/ready
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logs-backend-content
  namespace: product-observability
data:
  ready: logs-backend-ok
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-backend-content
  namespace: product-observability
data:
  ready: metrics-backend-ok
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logs-backend
  namespace: product-observability
  labels:
    app: logs-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logs-backend
  template:
    metadata:
      labels:
        app: logs-backend
    spec:
      containers:
        - name: logs-backend
          image: nginx:1.27
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: logs-backend-content
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: logs-backend-content
          configMap:
            name: logs-backend-content
---
apiVersion: v1
kind: Service
metadata:
  name: logs-backend
  namespace: product-observability
  labels:
    app: logs-backend
spec:
  selector:
    app: logs-backend
  ports:
    - name: http
      port: 3100
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-backend
  namespace: product-observability
  labels:
    app: metrics-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-backend
  template:
    metadata:
      labels:
        app: metrics-backend
    spec:
      containers:
        - name: metrics-backend
          image: nginx:1.27
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: metrics-backend-content
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: metrics-backend-content
          configMap:
            name: metrics-backend-content
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-backend
  namespace: product-observability
  labels:
    app: metrics-backend
spec:
  selector:
    app: metrics-backend
  ports:
    - name: http
      port: 9090
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-ui
  namespace: product-observability
  labels:
    app: observability-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observability-ui
  template:
    metadata:
      labels:
        app: observability-ui
    spec:
      serviceAccountName: observability-ui
      containers:
        - name: observability-ui
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /www
              echo "observability-ui loaded" > /www/index.html
              httpd -p 3000 -h /www &
              while true; do
                url="$(
                  awk '
                    /^[[:space:]]*- name:[[:space:]]*cluster-logs[[:space:]]*$/ { in_logs=1; next }
                    in_logs && /^[[:space:]]*- name:/ { in_logs=0 }
                    in_logs && /^[[:space:]]*url:/ {
                      sub(/^[[:space:]]*url:[[:space:]]*/, "")
                      print
                      exit
                    }
                  ' /etc/observability-ui/provisioning/datasources/datasource.yaml
                )"
                if wget -qO- "$url" 2>/dev/null | grep -q "logs-backend-ok"; then
                  echo "logs-ready" > /www/panels
                  echo "log panels ready via ${url}"
                else
                  echo "logs-empty" > /www/panels
                  echo "log panels empty via ${url}" >&2
                fi
                sleep 3
              done
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: datasource
              mountPath: /etc/observability-ui/provisioning/datasources
              readOnly: true
      volumes:
        - name: datasource
          secret:
            secretName: observability-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: observability-ui
  namespace: product-observability
  labels:
    app: observability-ui
spec:
  selector:
    app: observability-ui
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-monitor
  namespace: product-observability
  labels:
    app: incident-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-monitor
  template:
    metadata:
      labels:
        app: incident-monitor
    spec:
      containers:
        - name: incident-monitor
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              ui_url="http://observability-ui.product-observability.svc.cluster.local:3000/panels"
              while true; do
                if wget -qO- "$ui_url" 2>/dev/null | grep -q "logs-ready"; then
                  echo "incident monitor confirmed log panels via ${ui_url}"
                else
                  echo "incident monitor waiting for log panels via ${ui_url}" >&2
                fi
                sleep 4
              done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  namespace: product-observability
  labels:
    app: docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs
  template:
    metadata:
      labels:
        app: docs
    spec:
      containers:
        - name: docs
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /www
              echo "docs" > /www/index.html
              httpd -f -p 8080 -h /www
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: docs
  namespace: product-observability
  labels:
    app: docs
spec:
  selector:
    app: docs
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
  namespace: product-observability
  labels:
    app: demo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-api
  template:
    metadata:
      labels:
        app: demo-api
    spec:
      containers:
        - name: demo-api
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /www
              echo "demo-api" > /www/index.html
              httpd -f -p 8080 -h /www
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-api
  namespace: product-observability
  labels:
    app: demo-api
spec:
  selector:
    app: demo-api
  ports:
    - name: http
      port: 80
      targetPort: http
