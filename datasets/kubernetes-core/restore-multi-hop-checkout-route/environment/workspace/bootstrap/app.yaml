  name: allow-docs-to-metrics
  namespace: retail-prod
spec:
  podSelector:
    matchLabels:
      app: metrics
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: docs
      ports:
        - protocol: TCP
          port: 8080
