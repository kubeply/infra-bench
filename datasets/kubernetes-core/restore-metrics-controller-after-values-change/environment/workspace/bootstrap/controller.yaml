apiVersion: v1
kind: Namespace
metadata:
  name: metrics-team
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-bench-agent
  namespace: metrics-team
---
apiVersion: v1
kind: Secret
metadata:
  name: infra-bench-agent-token
  namespace: metrics-team
  annotations:
    kubernetes.io/service-account.name: infra-bench-agent
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infra-bench-agent
  namespace: metrics-team
rules:
  - apiGroups: [""]
    resources:
      ["configmaps", "endpoints", "events", "pods", "pods/log", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["metrics-adapter"]
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infra-bench-agent
  namespace: metrics-team
subjects:
  - kind: ServiceAccount
    name: infra-bench-agent
    namespace: metrics-team
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infra-bench-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-adapter
  namespace: metrics-team
  labels:
    app.kubernetes.io/name: metrics-adapter
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: platform-metrics
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: platform-metrics
    meta.helm.sh/release-namespace: metrics-team
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: metrics-adapter
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metrics-adapter
        app.kubernetes.io/component: controller
        app.kubernetes.io/instance: platform-metrics
    spec:
      containers:
        - name: metrics-adapter
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /www
              echo "metrics adapter ready" > /www/ready
              exec httpd -f -p 8443 -h /www
          ports:
            - name: https
              containerPort: 8443
          readinessProbe:
            httpGet:
              path: /ready
              port: https
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-adapter
  namespace: metrics-team
  labels:
    app.kubernetes.io/name: metrics-adapter
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: platform-metrics
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: platform-metrics
    meta.helm.sh/release-namespace: metrics-team
spec:
  selector:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/component: controller
  ports:
    - name: https
      port: 443
      targetPort: https
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-adapter-values
  namespace: metrics-team
  labels:
    app.kubernetes.io/name: metrics-adapter
    app.kubernetes.io/instance: platform-metrics
    app.kubernetes.io/managed-by: Helm
data:
  values.yaml: |
    service:
      port: 443
      targetPort: https
    controller:
      replicas: 2
      securePort: 8443
      release: platform-metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-proxy
  namespace: metrics-team
  labels:
    app.kubernetes.io/name: telemetry-proxy
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: telemetry-stack
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: telemetry-stack
    meta.helm.sh/release-namespace: metrics-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: telemetry-proxy
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: telemetry-proxy
        app.kubernetes.io/component: controller
        app.kubernetes.io/instance: telemetry-stack
    spec:
      containers:
        - name: telemetry-proxy
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /www
              echo "telemetry proxy ready" > /www/ready
              exec httpd -f -p 8443 -h /www
          ports:
            - name: https
              containerPort: 8443
          readinessProbe:
            httpGet:
              path: /ready
              port: https
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-proxy
  namespace: metrics-team
  labels:
    app.kubernetes.io/name: telemetry-proxy
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: telemetry-stack
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: telemetry-stack
    meta.helm.sh/release-namespace: metrics-team
spec:
  selector:
    app.kubernetes.io/name: telemetry-proxy
    app.kubernetes.io/component: controller
  ports:
    - name: https
      port: 443
      targetPort: https
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: telemetry-proxy-values
  namespace: metrics-team
  labels:
    app.kubernetes.io/name: telemetry-proxy
    app.kubernetes.io/instance: telemetry-stack
    app.kubernetes.io/managed-by: Helm
data:
  values.yaml: |
    service:
      port: 443
      targetPort: https
    controller:
      replicas: 1
      securePort: 8443
      release: telemetry-stack
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-bench-baseline
  namespace: metrics-team
data:
  deployment_uid: ""
  service_uid: ""
  values_uid: ""
  dashboard_deployment_uid: ""
  dashboard_service_uid: ""
  telemetry_deployment_uid: ""
  telemetry_service_uid: ""
  telemetry_values_uid: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-dashboard
  namespace: metrics-team
  labels:
    app.kubernetes.io/name: metrics-dashboard
    app.kubernetes.io/component: client
    app.kubernetes.io/instance: platform-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metrics-dashboard
      app.kubernetes.io/component: client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metrics-dashboard
        app.kubernetes.io/component: client
        app.kubernetes.io/instance: platform-metrics
    spec:
      containers:
        - name: metrics-dashboard
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          env:
            - name: METRICS_URL
              value: http://metrics-adapter.metrics-team.svc.cluster.local:443/ready
          command:
            - sh
            - -c
            - |
              mkdir -p /www
              httpd -p 8080 -h /www &
              while true; do
                if wget -qO- -T 3 "$METRICS_URL" | grep -q "metrics adapter ready"; then
                  echo "ready" > /www/ready
                  echo "metrics dashboard reached metrics-adapter"
                else
                  rm -f /www/ready
                  echo "metrics dashboard cannot reach metrics-adapter" >&2
                fi
                sleep 3
              done
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-dashboard
  namespace: metrics-team
  labels:
    app.kubernetes.io/name: metrics-dashboard
    app.kubernetes.io/component: client
    app.kubernetes.io/instance: platform-metrics
spec:
  selector:
    app.kubernetes.io/name: metrics-dashboard
    app.kubernetes.io/component: client
  ports:
    - name: http
      port: 80
      targetPort: http
