apiVersion: v1
kind: Namespace
metadata:
  name: orders-team
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-config
  namespace: orders-team
data:
  mode: |
    live
  region: |
    eu-west
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-bench-agent
  namespace: orders-team
---
apiVersion: v1
kind: Secret
metadata:
  name: infra-bench-agent-token
  namespace: orders-team
  annotations:
    kubernetes.io/service-account.name: infra-bench-agent
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infra-bench-agent
  namespace: orders-team
rules:
  - apiGroups: [""]
    resources: ["configmaps", "events", "pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["orders-api"]
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infra-bench-agent
  namespace: orders-team
subjects:
  - kind: ServiceAccount
    name: infra-bench-agent
    namespace: orders-team
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infra-bench-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: orders-team
  labels:
    app: orders-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      containers:
        - name: orders-api
          image: nginx:1.27
          ports:
            - name: http
              containerPort: 80
          env:
            - name: ORDER_MODE
              valueFrom:
                configMapKeyRef:
                  name: orders-config
                  key: active_mode
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-bench-baseline
  namespace: orders-team
data:
  deployment_uid: ""
  configmap_uid: ""
