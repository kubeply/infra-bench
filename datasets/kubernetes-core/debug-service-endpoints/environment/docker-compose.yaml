services:
  main:
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - kubeconfig:/kube

  k3s:
    image: rancher/k3s:v1.35.3-k3s1
    privileged: true
    command:
      - server
      - --disable=traefik
      - --disable=servicelb
      - --write-kubeconfig=/kube/kubeconfig.yaml
      - --write-kubeconfig-mode=666
      - --tls-san=k3s
    volumes:
      - kubeconfig:/kube
      - k3s-data:/var/lib/rancher/k3s
    healthcheck:
      test: ["CMD-SHELL", "kubectl get --raw=/readyz >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s

  bootstrap:
    build:
      context: .
    depends_on:
      k3s:
        condition: service_healthy
    environment:
      KUBECONFIG: /kube/kubeconfig.yaml
    volumes:
      - kubeconfig:/kube
    command: ["bootstrap-cluster"]

volumes:
  kubeconfig:
  k3s-data:
