apiVersion: v1
kind: Namespace
metadata:
  name: web-debug
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: web-debug
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:1.27
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: web-debug
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-bench-baseline
  namespace: web-debug
data:
  deployment_uid: ""
  service_uid: ""
