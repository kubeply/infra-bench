apiVersion: v1
kind: Namespace
metadata:
  name: checkout-services
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: checkout-content
  namespace: checkout-services
data:
  readyz: |
    ok
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-bench-agent
  namespace: checkout-services
---
apiVersion: v1
kind: Secret
metadata:
  name: infra-bench-agent-token
  namespace: checkout-services
  annotations:
    kubernetes.io/service-account.name: infra-bench-agent
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infra-bench-agent
  namespace: checkout-services
rules:
  - apiGroups: [""]
    resources: ["configmaps", "events", "pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["checkout-api"]
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infra-bench-agent
  namespace: checkout-services
subjects:
  - kind: ServiceAccount
    name: infra-bench-agent
    namespace: checkout-services
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infra-bench-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: checkout-services
  labels:
    app: checkout-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
    spec:
      containers:
        - name: checkout-api
          image: nginx:1.27
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 2
          volumeMounts:
            - name: checkout-content
              mountPath: /usr/share/nginx/html/readyz
              subPath: readyz
      volumes:
        - name: checkout-content
          configMap:
            name: checkout-content
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-bench-baseline
  namespace: checkout-services
data:
  deployment_uid: ""
